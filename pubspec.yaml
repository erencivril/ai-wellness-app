name: ai_wellness_app
description: Health and wellness AI coaching app with Firebase AI and Cubit state management.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Firebase
  firebase_core: ^3.13.1
  firebase_ai: ^2.2.0
  firebase_remote_config: ^5.4.1

  # Local storage
  sqflite: ^2.4.2
  path: ^1.9.1

  # Routing
  go_router: ^15.1.2

  # Utilities
  get_it: ^8.0.3
  uuid: ^4.5.1
  intl: ^0.20.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
